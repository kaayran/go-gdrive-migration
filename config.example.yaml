# go-gdrive-migration config

# OAuth credentials. Generate these in Google Cloud Console (see README.md).
auth:
  credentials_file: credentials.json   # OAuth Client ID (Desktop app)
  token_file: token.json               # token is saved here after first login

# Google Drive folders: provide either plain ID or full folder URL.
# URL example: https://drive.google.com/drive/folders/<FOLDER_ID>
source_folder_id: "PASTE_SOURCE_FOLDER_ID_OR_LINK_HERE"   # Source root folder
target_folder_id: "PASTE_TARGET_FOLDER_ID_OR_LINK_HERE"   # Target root folder

# For local upload mode, set this instead of source_folder_id/sub_folder:
# source_local_path: "D:/Target/Resources"

# What to copy. Leave sub_folder/sub_folder_id empty to copy source_folder_id
# itself into target_folder_id using the source folder name (+ optional postfix).
# Or set a path relative to source_folder_id:
sub_folder: ""
# sub_folder: "Project Assets/2026"
# You can provide multiple sub_folder values separated by comma/; or new lines:
# sub_folder: "Folder1, Folder2; Project Assets/2026"
# Or provide IDs directly (then sub_folder may be omitted):
# sub_folder_id: "1ZzZzZzZ..."
# You can provide multiple IDs separated by comma/; or new lines:
# sub_folder_id: "1AAA..., 1BBB...; 1CCC..."

options:
  # Work mode:
  # drive_copy   -> copy a Google Drive folder into another Google Drive folder
  # local_upload -> upload a local folder into target_folder_id
  mode: drive_copy

  # Skip empty folders (including empty subtrees).
  skip_empty_folders: true

  # Resume after interruption: skip files already marked done in manifest.
  resume: true
  manifest_file: manifest.jsonl

  # Parallelism.
  scan_workers: 16   # tree traversal workers (typically 16-32)
  copy_workers: 12   # file copy workers
  upload_workers: 4  # local upload workers
  list_page_size: 1000  # keep at Drive max for best throughput

  # Pre-flight scan before copy.
  # false -> scan enabled (default behavior)
  # true  -> skip scan and start copying immediately
  skip_scan: true

  # Quick estimate mode (folders/files/bytes) without copying and without target changes.
  # Can be enabled here or via CLI flag --estimate.
  estimate_only: false

  # Suffix added to created target sub-folder name.
  # Example: source "MyFolder" + " Promo Materials" -> target "MyFolder Promo Materials".
  target_subfolder_postfix: ""

  # Source sub-folder color during/after copy.
  # If set, the tool colors source sub-folder to yellow when copy starts,
  # then to this final color on successful completion.
  # Supported values: red/orange/yellow/green/teal/blue/purple/pink/gray or #RRGGBB.
  change_color: ""

  # Test/simulation modes.
  dry_run: false           # no copy (with skip_scan=false shows scan+plan)
  verify_checksums: false  # compare source/target md5 after copy (slower scan/copy)
  assume_yes: true        # skip confirmation prompts (CI-friendly)

  # Retry with exponential backoff for 429/5xx and rate-limit 403.
  retry:
    max_attempts: 8
    initial_backoff_ms: 500
    max_backoff_ms: 60000
